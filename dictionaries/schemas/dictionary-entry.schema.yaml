version: 1
kind: dictionary_entry
required:
  - slug
  - label
  - category
  - rarity
  - weight
  - visibility
  - status
fields:
  slug:
    type: string
    notes: Stable identifier within one country scope.
  label:
    type: string
    notes: Human-readable editorial label.
  description:
    type: string
    optional: true
  category:
    type: string
    notes: Must reference a taxonomy category key.
  rarity:
    type: string
    allowed:
      - common
      - uncommon
      - rare
  weight:
    type: integer
    min: 1
    max: 1000
  visibility:
    type: string
    allowed:
      - foreground
      - midground
      - background
      - ambient
  seasonality:
    type: list
    item_type: string
    optional: true
  weather:
    type: list
    item_type: string
    optional: true
  time_context:
    type: list
    item_type: string
    optional: true
  environment:
    type: list
    item_type: string
    optional: true
  tags:
    type: list
    item_type: string
    optional: true
  compatibility:
    type: map
    optional: true
  editorial_notes:
    type: string
    optional: true
  status:
    type: string
    allowed:
      - active
      - hidden
      - draft
